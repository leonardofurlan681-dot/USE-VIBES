<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBES | Sunglasses</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --vibe-orange: #FF8F1C;
            --vibe-yellow: #FFD21E;
            --bg-color: #ffffff;
            --text-main: #000000;
            --whatsapp-color: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        .promo-bar { background: var(--vibe-orange); color: var(--vibe-yellow); text-align: center; padding: 8px; font-size: 10px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }

        /* Header Adaptável */
        header {
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            z-index: 100;
        }
        
        .header-left { display: flex; align-items: center; }
        .logo-img { height: 40px; width: auto; object-fit: contain; }

        .logo-central { 
            font-weight: 600; 
            font-size: 22px; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            color: #000; 
            text-align: center;
            cursor: pointer;
        }

        .icons { display: flex; justify-content: flex-end; font-size: 20px; }
        .cart-btn { position: relative; cursor: pointer; }
        .cart-count {
            position: absolute; top: -8px; right: -10px; background: var(--vibe-orange); color: #fff;
            font-size: 10px; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Banner Mobile Friendly */
        .hero-slider { width: 100%; height: auto; min-height: 250px; background: #f9f9f9; position: relative; display: flex; align-items: center; padding: 20px; }
        .slide { display: flex; flex-direction: row; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; margin: 0 auto; }
        .slide-content h2 { font-size: 24px; text-transform: uppercase; line-height: 1.1; }
        .slide-img img { max-width: 180px; height: auto; mix-blend-mode: multiply; }

        /* Layout Responsivo */
        .main-layout { display: flex; flex-direction: row; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 30px; }

        /* Sidebar que vira menu horizontal no mobile */
        .sidebar { width: 220px; flex-shrink: 0; }
        .sidebar h4 { font-size: 11px; letter-spacing: 2px; margin-bottom: 15px; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 5px; }
        .sidebar-menu li { padding: 12px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; transition: 0.2s; border: 1px solid transparent; }
        .sidebar-menu li.active { background: #000; color: #fff; font-weight: 600; }

        /* Grid de Produtos */
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-grow: 1; }
        .product-card { border: 1px solid #eee; padding: 10px; text-align: center; border-radius: 8px; background: #fff; }
        
        .img-box { position: relative; background: #fcfcfc; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border-radius: 5px; }
        .img-box img { width: 95%; height: auto; transition: 0.3s; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: 1px solid #eee; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .btn-l { left: 4px; }
        .btn-r { right: 4px; }

        .product-card h4 { font-size: 13px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .price { color: var(--vibe-orange); font-weight: 600; font-size: 16px; display: block; margin: 5px 0; }
        .btn-add { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: 600; border-radius: 4px; }

        /* Carrinho Lateral */
        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; z-index: 200; padding: 25px; }
        .cart-sidebar.active { right: 0; }
        
        /* Ajustes Mobile (Telas até 768px) */
        @media (max-width: 768px) {
            header { grid-template-columns: 60px 1fr 60px; padding: 10px; }
            .logo-img { height: 35px; }
            .logo-central { font-size: 16px; letter-spacing: 3px; }

            .slide { flex-direction: column-reverse; text-align: center; gap: 15px; }
            .slide-img img { max-width: 150px; }

            .main-layout { flex-direction: column; padding: 15px; }
            .sidebar { width: 100%; }
            .sidebar h4 { text-align: center; }
            .sidebar-menu { flex-direction: row; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
            .sidebar-menu::-webkit-scrollbar { display: none; }
            .sidebar-menu li { white-space: nowrap; padding: 8px 15px; background: #f5f5f5; border-radius: 20px; }

            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .product-card { padding: 8px; }
            .product-card h4 { font-size: 12px; }
            .price { font-size: 14px; }
            
            .nav-btn { width: 28px; height: 28px; font-size: 10px; }
        }

        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: var(--whatsapp-color); color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 99; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="promo-bar">VIBES | COLEÇÃO ESPORTIVA 2026</div>

<header>
    <div class="header-left">
        <img src="logo.png" alt="Logo" class="logo-img">
    </div>
    
    <div class="logo-central" onclick="window.location.reload()">VIBES</div>
    
    <div class="icons">
        <div class="cart-btn" onclick="toggleCart()">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</header>

<section class="hero-slider">
    <div class="slide">
        <div class="slide-content">
            <h2>Estilo &<br>Performance</h2>
            <p style="font-size: 12px; color: #666; margin-top: 5px;">Novos Esportivos Vibes</p>
        </div>
        <div class="slide-img">
            <img src="banner destaque/banner1.jpg" onerror="this.src='https://via.placeholder.com/300x200?text=Vibes+Destaque'">
        </div>
    </div>
</section>

<div class="main-layout">
    <aside class="sidebar">
        <h4>CATEGORIAS</h4>
        <ul class="sidebar-menu">
            <li class="active" onclick="filtrar('todos', this)">TODOS</li>
            <li onclick="filtrar('esportivo', this)">ESPORTIVOS</li>
            <li onclick="filtrar('feminino', this)">FEMININOS</li>
            <li onclick="filtrar('masculino', this)">MASCULINOS</li>
        </ul>
    </aside>

    <main class="product-grid" id="grid">
        </main>
</div>

<div class="cart-sidebar" id="cart">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>SACOLA</h3>
        <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor:pointer; font-size:20px;"></i>
    </div>
    <div id="cartItems" style="max-height: 60vh; overflow-y: auto;"></div>
    <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
        <p style="display:flex; justify-content:space-between;">Total: <strong id="cartTotal">R$ 0,00</strong></p><br>
        <button class="btn-add" onclick="finalizar()" style="background: var(--whatsapp-color);">FINALIZAR WHATSAPP</button>
    </div>
</div>

<a href="https://wa.me/5519989620949" class="whatsapp-float" target="_blank">
    <i class="fa-brands fa-whatsapp"></i>
</a>

<script>
    const nomesCores = ["Preto", "Branco", "Azul", "Vermelho", "Verde", "Amarelo", "Laranja", "Cinza"];
    const produtos = [];

    // Gerar 12 Esportivos
    for(let i=1; i<=12; i++) {
        produtos.push({ id: i, nome: `Sport Model ${i}`, preco: 259.90, pasta: "esportivos", cat: "esportivo", corAtual: 0 });
    }
    // Femininos e Masculinos
    produtos.push({ id: 101, nome: "Lux Feminino", preco: 199.0, pasta: "femininos", cat: "feminino", corAtual: 0 });
    produtos.push({ id: 201, nome: "Bold Masculino", preco: 219.0, pasta: "masculinos", cat: "masculino", corAtual: 0 });

    let carrinho = [];

    function render(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = lista.map(p => {
            const imgPath = `${p.pasta}/${p.id}_${p.corAtual}.jpg`;
            return `
            <div class="product-card">
                <div class="img-box">
                    <button class="nav-btn btn-l" onclick="trocarCor(${p.id}, -1)">❮</button>
                    <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/200x200?text=Foto+${p.id}'">
                    <button class="nav-btn btn-r" onclick="trocarCor(${p.id}, 1)">❯</button>
                </div>
                <h4>${p.nome}</h4>
                <p style="font-size:10px; color:#999; margin:3px 0;">Cor: ${nomesCores[p.corAtual]}</p>
                <span class="price">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                <button class="btn-add" onclick="add(${p.id})">ADICIONAR</button>
            </div>
            `;
        }).join('');
    }

    function trocarCor(id, dir) {
        const p = produtos.find(x => x.id === id);
        p.corAtual += dir;
        if(p.corAtual > 7) p.corAtual = 0;
        if(p.corAtual < 0) p.corAtual = 7;
        render(produtos);
    }

    function filtrar(cat, el) {
        document.querySelectorAll('.sidebar-menu li').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        const f = cat === 'todos' ? produtos : produtos.filter(p => p.cat === cat);
        render(f);
    }

    function toggleCart() { document.getElementById('cart').classList.toggle('active'); }

    function add(id) {
        const p = produtos.find(x => x.id === id);
        carrinho.push({ ...p, corNome: nomesCores[p.corAtual] });
        atualizarCarrinho();
        if(window.innerWidth > 768) toggleCart();
    }

    function atualizarCarrinho() {
        document.getElementById('cartCount').innerText = carrinho.length;
        let t = 0;
        document.getElementById('cartItems').innerHTML = carrinho.map((p, i) => {
            t += p.preco;
            return `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <div style="font-size:12px;">
                    <strong>${p.nome}</strong><br><small>${p.corNome}</small>
                </div>
                <div>
                    <span style="font-size:12px; font-weight:600;">R$ ${p.preco.toFixed(2)}</span>
                    <i class="fa-solid fa-trash" onclick="remover(${i})" style="color:#ccc; margin-left:10px; cursor:pointer;"></i>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cartTotal').innerText = `R$ ${t.toFixed(2).replace('.',',')}`;
    }

    function remover(i) {
        carrinho.splice(i, 1);
        atualizarCarrinho();
    }

    function finalizar() {
        if(carrinho.length === 0) return alert("Adicione itens à sacola!");
        let msg = "🚀 *NOVO PEDIDO VIBES*:%0A%0A" + carrinho.map(p => `• ${p.nome} (${p.corNome})`).join('%0A');
        window.open(`https://wa.me/5519989620949?text=${msg}`, "_blank");
    }

    render(produtos);
</script>
</body>
</html>
