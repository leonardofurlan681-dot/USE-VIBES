<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBES | Sunglasses</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --vibe-orange: #FF8F1C; --whatsapp-color: #25D366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        
        body { 
            background-image: url('fundo.jpg'); 
            background-color: #f4f4f4; 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: -1; 
        }

        .promo-bar { background: var(--vibe-orange); color: #000; text-align: center; padding: 8px; font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 2px; }

        header {
            display: grid; grid-template-columns: 50px 1fr 50px; align-items: center;
            padding: 10px 15px; border-bottom: 2px solid var(--vibe-orange);
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); z-index: 100;
        }
        
        .logo-central { font-weight: 800; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; text-align: center; cursor: pointer; color: #000; }

        /* BANNER */
        .slider-container { position: relative; width: 100%; height: 500px; background: #fff; overflow: hidden; }
        .main-slider { width: 300%; height: 100%; display: flex; transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); }
        .banner-slide { width: 100%; height: 100%; display: flex; align-items: center; position: relative; background: #fff; }
        
        .banner-text { width: 50%; z-index: 5; padding: 0 5%; display: flex; flex-direction: column; align-items: flex-start; }
        .banner-text h2 { font-size: 38px; font-weight: 800; line-height: 1.1; margin-bottom: 10px; text-transform: uppercase; color: #000; }
        .banner-text h2 span { color: var(--vibe-orange); }
        .banner-text p { font-size: 15px; color: #444; margin-bottom: 20px; }
        
        .banner-img-area { width: 50%; height: 100%; position: relative; }
        .banner-img-area img { width: 100%; height: 100%; object-fit: cover; }

        .slider-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.1); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .prev-arrow { left: 10px; } .next-arrow { right: 10px; }

        @media (max-width: 768px) {
            .slider-container { height: 280px; }
            .banner-slide { flex-direction: row !important; }
            .banner-text { width: 55%; padding: 10px; }
            .banner-text h2 { font-size: 18px; }
            .banner-text p { font-size: 10px; margin-bottom: 10px; }
            .banner-text img { max-width: 70px !important; margin-bottom: 5px !important; }
            .banner-img-area { width: 45%; }
        }

        /* GRID PRODUTOS */
        .main-layout { max-width: 1200px; margin: 0 auto; padding: 20px 10px; width: 100%; flex-grow: 1; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        @media (max-width: 768px) { .product-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }

        .product-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.2); }
        .img-box { width: 100%; aspect-ratio: 1 / 1; position: relative; overflow: hidden; background: #fff; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; z-index: 5; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .btn-l { left: 5px; } .btn-r { right: 5px; }

        .btn-add-cart { background: var(--vibe-orange); color: #000; border: none; width: 100%; padding: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .btn-add-cart:active { transform: scale(0.98); }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; width: 100%; max-width: 800px; display: flex; border-radius: 15px; overflow: hidden; position: relative; }
        .modal-img-side { width: 50%; aspect-ratio: 1/1; position: relative; }
        .modal-info-side { width: 50%; padding: 25px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 768px) { .modal-content { flex-direction: column; max-height: 90vh; overflow-y: auto; } .modal-img-side, .modal-info-side { width: 100%; } }

        /* SIDEBARS */
        .sidebar, .cart-sidebar { position: fixed; top: 0; width: 300px; height: 100%; background: #fff; z-index: 200; transition: 0.4s; padding: 25px; display: flex; flex-direction: column; }
        .sidebar { left: -310px; } .sidebar.active { left: 0; }
        .cart-sidebar { right: -310px; } .cart-sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        .overlay.active { display: block; }
        .close-sidebar { align-self: flex-end; font-size: 24px; cursor: pointer; margin-bottom: 20px; }

        footer { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 20px; text-align: center; border-top: 2px solid var(--vibe-orange); }
    </style>
</head>
<body>

<div class="promo-bar">VIBES | PREMIUM SUNGLASSES 2026</div>

<header>
    <div onclick="toggleSidebar('sidebar')" style="cursor:pointer; font-size: 20px;"><i class="fa-solid fa-bars"></i></div>
    <div class="logo-central" onclick="location.reload()">VIBES</div>
    <div onclick="toggleSidebar('cart-sidebar')" style="cursor:pointer; position:relative; font-size: 20px;">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count" style="position: absolute; top:-8px; right:-8px; background:#000; color:#fff; font-size:9px; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;">0</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<aside class="sidebar" id="sidebar">
    <div class="close-sidebar" onclick="closeAll()"><i class="fa-solid fa-xmark"></i></div>
    <h3 style="border-bottom: 2px solid var(--vibe-orange); padding-bottom: 10px;">CATEGORIAS</h3>
    <div onclick="filtrar('todos')" style="padding: 15px 0; cursor: pointer; font-weight: 600;">TODOS</div>
    <div onclick="filtrar('masculino')" style="padding: 15px 0; cursor: pointer; font-weight: 600;">MASCULINO</div>
    <div onclick="filtrar('feminino')" style="padding: 15px 0; cursor: pointer; font-weight: 600;">FEMININO</div>
</aside>

<section class="slider-container">
    <button class="slider-arrow prev-arrow" onclick="moveSlider(-1)">❮</button>
    <button class="slider-arrow next-arrow" onclick="moveSlider(1)">❯</button>
    <div class="main-slider" id="mainSlider">
        <div class="banner-slide">
            <div class="banner-text">
                <img src="logo.png" style="max-width: 130px; margin-bottom: 10px;" onerror="this.src='https://via.placeholder.com/130x40?text=VIBES'">
                <h2>ESTILO<span> ÚNICO</span></h2><p>Proteção UV400 premium.</p>
                <button class="btn-add-cart" style="width:auto; padding: 10px 20px;" onclick="location.href='#grid'">VER MAIS</button>
            </div>
            <div class="banner-img-area"><img src="banner destaque/destaque 1.jpg"></div>
        </div>
        <div class="banner-slide">
            <div class="banner-text">
                <h2>NOVA<span> LINHA</span></h2><p>Design moderno e leve.</p>
                <button class="btn-add-cart" style="width:auto; padding: 10px 20px;" onclick="location.href='#grid'">EXPLORAR</button>
            </div>
            <div class="banner-img-area"><img src="banner destaque/destaque 2.jpg"></div>
        </div>
        <div class="banner-slide">
            <div class="banner-text">
                <h2>QUALIDADE<span> VIBES</span></h2><p>Lentes polarizadas.</p>
                <button class="btn-add-cart" style="width:auto; padding: 10px 20px;" onclick="location.href='#grid'">COMPRAR</button>
            </div>
            <div class="banner-img-area"><img src="banner destaque/destaque 3.jpg"></div>
        </div>
    </div>
</section>

<div class="main-layout" id="grid">
    <main class="product-grid" id="product-list"></main>
</div>

<footer style="margin-top:auto">
    <p style="font-size:11px; font-weight:800;">USE VIBES2026 / TODOS OS DIREITOS RESERVADOS</p>
</footer>

<aside class="cart-sidebar" id="cart-sidebar">
    <div class="close-sidebar" onclick="closeAll()"><i class="fa-solid fa-xmark"></i></div>
    <h3>MEU CARRINHO</h3>
    <div id="cart-items" style="flex-grow: 1; overflow-y: auto; margin: 20px 0;"></div>
    <div style="padding: 15px 0; font-weight: 800; border-top: 1px solid #eee;">TOTAL: R$ <span id="cart-total">0,00</span></div>
    <button class="btn-add-cart" style="background: var(--whatsapp-color); color:#fff; font-size: 13px;" onclick="checkout()"><i class="fa-brands fa-whatsapp"></i> PEDIR NO WHATSAPP</button>
</aside>

<div class="modal" id="productModal">
    <div class="modal-content">
        <div onclick="closeModal()" style="position: absolute; top: 15px; right: 15px; z-index: 20; cursor: pointer; font-size: 25px;"><i class="fa-solid fa-xmark"></i></div>
        <div class="modal-img-side" id="modal-img"></div>
        <div class="modal-info-side" id="modal-info"></div>
    </div>
</div>

<script>
    const catalogo = [
         ["Casual Dourado Lente Verde", 69.90, "masculino", ["oculos casual dourado lente verde.jpg", "oculos dourado casual lente verde 2.jpg"]],
        ["Óculos Casual Urban Black", 74.90, "masculino", ["oculos casual urban black.jpg", "oculos casual urban black 2.jpg"]],
        ["Casual Redondo Madeira", 72.00, "masculino", ["oculos casual redondo madeira.jpg", "oculos casual redondo madeira 2.jpg"]],
        ["Esportivo Lente Amarela", 79.90, "esportivo", ["oculos esportivo lente amarela.jpg", "oculos esportivo lente amarela 2.jpg"]],
        ["Esportivo Carbon Preto", 80.00, "esportivo", ["oculos esportivo preto.jpg", "oculos esportivo preto 2.jpg"]],
        ["Casual Quadrado Black", 69.90, "masculino", ["oculos preto casual quadrado.jpg", "oculos preto casual quadrado 2.jpg"]],
        ["Casual Redondo Black", 74.50, "masculino", ["oculos preto casual redondo.jpg", "oculos preto casual redondo 2.jpg"]],
        ["Transparente Lente Verde", 78.00, "masculino", ["oculos preto transparente lente verde.jpg", "oculos preto transparente lente verde 2.jpg"]],
        ["Redondo Marrom Tortoise", 73.00, "feminino", ["oculos redondo casual marrom.jpg", "oculos redondo casual marrom 2.jpg"]]
    ];

    let produtos = catalogo.map((p, i) => ({ id: i, nome: p[0], preco: p[1], cat: p[2], fotos: p[3], fotoAtual: 0 }));
    let carrinho = [];
    let filtroAtivo = 'todos';
    let currentSlide = 0;

    function moveSlider(dir) {
        currentSlide = (currentSlide + dir + 3) % 3;
        document.getElementById('mainSlider').style.transform = `translateX(-${(currentSlide * 100) / 3}%)`;
    }

    function render() {
        const lista = filtroAtivo === 'todos' ? produtos : produtos.filter(p => p.cat === filtroAtivo);
        document.getElementById('product-list').innerHTML = lista.map(p => `
            <div class="product-card">
                <div class="img-box">
                    <button class="nav-btn btn-l" onclick="changePic(${p.id}, -1, event)">❮</button>
                    <img src="oculos/${p.fotos[p.fotoAtual]}" onclick="openModal(${p.id})" onerror="this.src='https://via.placeholder.com/400'">
                    <button class="nav-btn btn-r" onclick="changePic(${p.id}, 1, event)">❯</button>
                </div>
                <div style="padding:12px; text-align:center; cursor:pointer" onclick="openModal(${p.id})">
                    <p style="font-size:11px; font-weight:600; text-transform:uppercase;">${p.nome}</p>
                    <span style="color:var(--vibe-orange); font-weight:800; font-size:18px;">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                </div>
                <button class="btn-add-cart" onclick="addToCart(${p.id})">ADICIONAR</button>
            </div>
        `).join('');
    }

    function filtrar(cat) {
        filtroAtivo = cat;
        render();
        closeAll();
        window.location.href = "#grid";
    }

    function changePic(id, dir, e) {
        if(e) e.stopPropagation();
        const p = produtos.find(x => x.id === id);
        p.fotoAtual = (p.fotoAtual + dir + p.fotos.length) % p.fotos.length;
        render();
        if(document.getElementById('productModal').classList.contains('active')) updateModalImg(p);
    }

    function openModal(id) {
        const p = produtos.find(x => x.id === id);
        updateModalImg(p);
        document.getElementById('modal-info').innerHTML = `
            <h2 style="font-size: 20px; text-transform:uppercase;">${p.nome}</h2>
            <p style="color:var(--vibe-orange); font-size:24px; font-weight:800; margin:10px 0;">R$ ${p.preco.toFixed(2).replace('.',',')}</p>
            <p style="font-size:13px; color:#666; margin-bottom:20px;">Proteção UV400 premium Vibes.</p>
            <button class="btn-add-cart" onclick="addToCart(${p.id}); closeModal()">ADICIONAR AO CARRINHO</button>
        `;
        document.getElementById('productModal').classList.add('active');
    }

    function updateModalImg(p) {
        document.getElementById('modal-img').innerHTML = `
            <button class="nav-btn btn-l" onclick="changePic(${p.id}, -1)">❮</button>
            <img src="oculos/${p.fotos[p.fotoAtual]}" style="width:100%; height:100%; object-fit:cover;">
            <button class="nav-btn btn-r" onclick="changePic(${p.id}, 1)">❯</button>
        `;
    }

    function toggleSidebar(id) { document.getElementById(id).classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function closeAll() { document.querySelectorAll('.sidebar, .cart-sidebar, .overlay').forEach(el => el.classList.remove('active')); }
    function closeModal() { document.getElementById('productModal').classList.remove('active'); }

    function addToCart(id) {
        carrinho.push(produtos.find(x => x.id === id));
        updateCart();
        toggleSidebar('cart-sidebar');
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = carrinho.length;
        let total = 0;
        document.getElementById('cart-items').innerHTML = carrinho.map((item, i) => {
            total += item.preco;
            return `<div style="display:flex; gap:10px; margin-bottom:15px; align-items:center; border-bottom:1px solid #f0f0f0; padding-bottom:10px;">
                <img src="oculos/${item.fotos[0]}" width="50" height="50" style="object-fit:cover; border-radius:5px;">
                <div style="flex:1; font-size:11px;"><b>${item.nome}</b><br>R$ ${item.preco.toFixed(2)}</div>
                <i class="fa-solid fa-trash" onclick="removeItem(${i})" style="color:red; cursor:pointer; padding:5px;"></i>
            </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = total.toFixed(2).replace('.',',');
    }

    function removeItem(i) {
        carrinho.splice(i, 1);
        updateCart();
    }

    function checkout() {
        if(carrinho.length === 0) return alert("Carrinho vazio!");
        let msg = "Olá Vibes! Gostaria de pedir:%0A" + carrinho.map(i => "- " + i.nome).join("%0A");
        window.open(`https://wa.me/5519989620949?text=${msg}`);
    }

    render();
    setInterval(() => moveSlider(1), 7000);
</script>
</body>
</html>
