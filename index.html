<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P10 STORE | Sneaker & Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --accent: #ffffff; /* Mudado de azul para branco */
            --bg: #101113; 
            --text: #ffffff; 
            --text-secondary: #aaaaaa; 
            --card-bg: #1a1c1f; 
            --border: #2a2d33; 
            --header-bg: rgba(16, 17, 19, 0.95); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header { 
            background: var(--header-bg); 
            padding: 10px 5%; 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }
        
        .header-left { justify-self: start; }
        .header-center { justify-self: center; }
        .header-right { justify-self: end; }

        /* Logo no Header */
        .logo-nav { height: 85px; width: auto; object-fit: contain; }
        
        header i { color: var(--text); font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        header i:hover { color: var(--accent); }

        /* BANNER PROMOCIONAL */
        .promo-banner {
            width: 100%;
            background: var(--accent);
            color: #000; /* Texto preto para contrastar com o fundo branco */
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* HERO SECTION */
        .hero-image { 
            width: 100%; 
            height: 60vh; 
            position: relative; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hero-image .bg-hero { 
            position: absolute;
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: brightness(0.6);
        }

        .hero-content {
            position: relative;
            z-index: 5;
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .hero-content p {
            font-weight: 400;
            color: #ccc;
            letter-spacing: 2px;
        }

        .hero-gradient { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%); 
            z-index: 2;
        }

        /* GRID DE PRODUTOS */
        .container { padding: 40px 5%; max-width: 1300px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1100px) { .grid { grid-template-columns: repeat(5, 1fr); } }
        
        .product-card { 
            background: var(--card-bg); 
            padding: 0 0 15px 0; /* Padding zero no topo e laterais para a imagem encostar */
            border-radius: 0; /* Borda quadrada */
            border: 1px solid var(--border); 
            cursor: pointer; 
            transition: 0.3s;
            overflow: hidden;
        }
        .product-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        .product-card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            background: #fff; 
            border-radius: 0; /* Foto quadrada */
            margin-bottom: 12px; 
            display: block;
        }
        
        .product-card h3 { 
            font-size: 0.8rem; 
            font-weight: 700; 
            height: 40px; 
            overflow: hidden; 
            margin-bottom: 5px; 
            padding: 0 15px; /* Adicionado padding para o texto não encostar na borda */
        }
        .product-card .price { 
            color: var(--accent); 
            font-weight: 900; 
            font-size: 1.1rem; 
            padding: 0 15px; /* Adicionado padding para o preço */
        }

        /* CARRINHO E MODAIS */
        .cart-sidebar { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #16181b; z-index: 2000; transition: 0.4s; padding: 30px; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: #1f2226; padding: 10px; border-radius: 0; } /* Borda quadrada */
        .cart-item img { width: 60px; height: 60px; object-fit: contain; background: #fff; border-radius: 0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-overlay.active { display: flex; }
        .modal-content { width: 90%; max-width: 400px; background: var(--card-bg); padding: 30px; border-radius: 0; text-align: center; } /* Borda quadrada */
        .size-btn { padding: 10px; border: 1px solid var(--border); background: #2a2d33; color: #fff; margin: 4px; cursor: pointer; border-radius: 0; font-weight: 700; }
        .size-btn.selected { background: var(--accent); color: #000; }
        .btn-action { width: 100%; padding: 18px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 0; background: var(--accent); color: #000; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1500; display: none; }
        .sidebar-overlay.active { display: block; }
    </style>
</head>
<body>

<div class="promo-banner">🔥 FRETE GRÁTIS PARA TODO O BRASIL EM COMPRAS ACIMA DE R$ 499</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleCart()"></div>

<header>
    <div class="header-left"><i class="fas fa-search" onclick="toggleSearch()"></i></div>
    
    <div class="header-center">
        <img src="logo.png" class="logo-nav" alt="P10 STORE">
    </div>

    <div class="header-right">
        <div onclick="toggleCart()" style="position:relative; cursor:pointer">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count" style="position:absolute; top:-10px; right:-10px; background:var(--accent); color:#000; font-size:0.7rem; padding:2px 6px; border-radius:50%; font-weight:900">0</span>
        </div>
    </div>
</header>

<div id="search-box" style="display:none; padding: 20px 5%; background: var(--card-bg); border-bottom: 1px solid var(--border);">
    <input type="text" id="input-busca" placeholder="O QUE VOCÊ PROCURA?" style="width: 100%; padding: 15px; border-radius: 0; border: 1px solid var(--border); background: #2a2d33; color: #fff; outline: none; text-align: center;">
</div>

<section class="hero-image">
    <div class="hero-gradient"></div>
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop" class="bg-hero" alt="Nike Banner">
    
    <div class="hero-content">
        <p>JUST DO IT</p>
        <h1>NIKE COLLECTION</h1>
        <p>O TOPO DO STREETWEAR MUNDIAL NA SUA MÃO</p>
    </div>
</section>

<div class="container">
    <h2 style="text-align:center; margin-bottom:30px; text-transform:uppercase; letter-spacing:2px; font-weight:900;">Destaques da Semana</h2>
    <div id="main-content" class="grid"></div>
</div>

<div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2>Meu Carrinho</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer"></i>
    </div>
    <div id="cart-list" style="flex:1; overflow-y:auto;"></div>
    <div class="cart-footer" style="border-top:1px solid var(--border); padding-top:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:900;">
            <span>Total:</span>
            <span id="total-value" style="color:var(--accent)">R$ 0,00</span>
        </div>
        <button class="btn-action" onclick="finalizarWhatsApp()">Finalizar Pedido</button>
    </div>
</div>

<div class="modal-overlay" id="modal-produto">
    <div class="modal-content">
        <img id="m-img" src="" style="width:100%; border-radius:0; margin-bottom:15px; background:#fff;">
        <h2 id="m-nome"></h2>
        <p id="m-preco" style="font-size:1.8rem; color:var(--accent); font-weight:900; margin:10px 0;"></p>
        <div id="m-sizes" style="margin-bottom:20px;"></div>
        <button class="btn-action" onclick="addAoCarrinho()">Adicionar ao Carrinho</button>
        <p onclick="closeModals()" style="margin-top:15px; cursor:pointer; color:var(--text-secondary);">Voltar</p>
    </div>
</div>

<script>
const PRODUTOS = [
    { id: 1, nome: "Nike Air Force 1 '07 All White", preco: "799,90", imagem: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1000&auto=format&fit=crop" },
    { id: 2, nome: "Nike Dunk Low Retro 'Panda'", preco: "1.199,90", imagem: "https://images.unsplash.com/photo-1605348532760-6753d2c43329?q=80&w=1000&auto=format&fit=crop" },
    { id: 3, nome: "Air Jordan 1 Retro 'Lost & Found'", preco: "1.899,90", imagem: "https://images.unsplash.com/photo-1597040933228-09e530420661?q=80&w=1000&auto=format&fit=crop" },
    { id: 4, nome: "Nike Air Max 270 Black Triple", preco: "999,90", imagem: "https://images.unsplash.com/photo-1514989940723-e8e51635b782?q=80&w=1000&auto=format&fit=crop" },
    { id: 5, nome: "Nike SB Dunk Low Blue Lagoon", preco: "1.349,00", imagem: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?q=80&w=1000&auto=format&fit=crop" }
];

let CART = [];
let SELECTED_PROD = null;
let SELECTED_SIZE = null;

function renderLoja() {
    const main = document.getElementById('main-content');
    main.innerHTML = PRODUTOS.map(p => `
        <div class="product-card" onclick="openProduct(${p.id})">
            <img src="${p.imagem}" alt="${p.nome}">
            <h3>${p.nome}</h3>
            <span class="price">R$ ${p.preco}</span>
        </div>
    `).join('');
}

function openProduct(id) {
    SELECTED_PROD = PRODUTOS.find(p => p.id === id);
    document.getElementById('m-img').src = SELECTED_PROD.imagem;
    document.getElementById('m-nome').innerText = SELECTED_PROD.nome;
    document.getElementById('m-preco').innerText = `R$ ${SELECTED_PROD.preco}`;
    
    let sizes = ['38', '39', '40', '41', '42', '43', '44'];
    SELECTED_SIZE = null;
    document.getElementById('m-sizes').innerHTML = sizes.map(s => `
        <button class="size-btn" onclick="selectSize(this, '${s}')">${s}</button>
    `).join('');
    document.getElementById('modal-produto').classList.add('active');
}

function selectSize(btn, s) {
    SELECTED_SIZE = s;
    Array.from(btn.parentNode.children).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function addAoCarrinho() {
    if(!SELECTED_SIZE) return alert("Selecione um tamanho!");
    CART.push({...SELECTED_PROD, tamanho: SELECTED_SIZE, cartId: Date.now()});
    updateCart();
    closeModals();
    toggleCart();
}

function updateCart() {
    document.getElementById('cart-count').innerText = CART.length;
    const list = document.getElementById('cart-list');
    let total = 0;
    list.innerHTML = CART.map(i => {
        total += parseFloat(i.preco.replace('.','').replace(',','.'));
        return `<div class="cart-item">
            <img src="${i.imagem}">
            <div style="flex:1">
                <p style="font-size:0.8rem; font-weight:700">${i.nome}</p>
                <p style="font-size:0.7rem; color:var(--text-secondary)">Tam: ${i.tamanho}</p>
                <p style="color:var(--accent); font-weight:900">R$ ${i.preco}</p>
            </div>
            <i class="fas fa-trash-alt" onclick="removerDoCarrinho(${i.cartId})" style="color:#ff4d4d; cursor:pointer"></i>
        </div>`;
    }).join('');
    document.getElementById('total-value').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
}

function removerDoCarrinho(cid) {
    CART = CART.filter(i => i.cartId !== cid);
    updateCart();
}

function toggleCart() {
    document.getElementById('cart-sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('active');
}

function toggleSearch() {
    const box = document.getElementById('search-box');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function closeModals() {
    document.getElementById('modal-produto').classList.remove('active');
}

function finalizarWhatsApp() {
    if(CART.length === 0) return alert("Carrinho vazio!");
    let msg = `*MD SHOES - NOVO PEDIDO*%0A%0A`;
    CART.forEach(i => msg += `- ${i.nome} (Tam: ${i.tamanho}) - R$ ${i.preco}%0A`);
    msg += `%0A*Total: ${document.getElementById('total-value').innerText}*`;
    window.open(`https://wa.me/5519989620949?text=${msg}`);
}

renderLoja();
</script>

</body>
</html>
