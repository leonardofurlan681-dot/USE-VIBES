<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBES | Sunglasses</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --vibe-orange: #FF8F1C;
            --vibe-yellow: #FFD21E;
            --bg-color: #ffffff;
            --text-main: #000000;
            --whatsapp-color: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }

        .promo-bar { background: var(--vibe-orange); color: var(--vibe-yellow); text-align: center; padding: 10px; font-size: 10px; text-transform: uppercase; font-weight: 600; }

        /* Header com VIBES Centralizado */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Divide em 3 colunas iguais */
            align-items: center;
            padding: 15px 40px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }
        
        .header-left { display: flex; align-items: center; }
        .logo-img { height: 50px; width: auto; }

        .logo-central { 
            font-weight: 600; 
            font-size: 28px; 
            letter-spacing: 10px; 
            text-transform: uppercase; 
            color: #000; 
            cursor: pointer;
            text-align: center;
        }

        .icons { display: flex; justify-content: flex-end; gap: 20px; font-size: 18px; }
        .icons i { cursor: pointer; position: relative; }
        .cart-count {
            position: absolute; top: -10px; right: -10px; background: var(--vibe-orange); color: #fff;
            font-size: 10px; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Banner */
        .hero-slider { width: 100%; height: 450px; background: #f9f9f9; overflow: hidden; position: relative; }
        .slide { display: flex; align-items: center; justify-content: center; height: 100%; padding: 0 10%; }
        .slide-img img { max-height: 400px; }

        /* Grid de Produtos */
        .main-layout { display: flex; max-width: 1400px; margin: 0 auto; padding: 40px 20px; gap: 40px; }
        .sidebar { width: 220px; }
        .sidebar-menu { list-style: none; cursor: pointer; }
        .sidebar-menu li { padding: 12px 0; border-bottom: 1px solid #eee; transition: 0.3s; }
        .sidebar-menu li.active { color: var(--vibe-orange); font-weight: 600; }

        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; flex-grow: 1; }
        .product-card { border: 1px solid #eee; padding: 15px; text-align: center; position: relative; }
        
        /* Navegação de Cores */
        .img-box { position: relative; background: #fcfcfc; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .img-box img { width: 90%; height: auto; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #fff; border: 1px solid #ddd; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .btn-l { left: 5px; }
        .btn-r { right: 5px; }

        .price { color: var(--vibe-orange); font-weight: 600; font-size: 18px; display: block; margin: 10px 0; }
        .btn-add { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        /* Carrinho Lateral */
        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 380px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; z-index: 200; padding: 30px; }
        .cart-sidebar.active { right: 0; }
        
        .whatsapp-float { position: fixed; bottom: 30px; right: 20px; background: var(--whatsapp-color); color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 99; }
    </style>
</head>
<body>

<div class="promo-bar">VIBES | FRETE GRÁTIS EM COMPRAS ACIMA DE R$ 299</div>

<header>
    <div class="header-left">
        <img src="logo.png" alt="Vibes Logo" class="logo-img">
    </div>
    
    <div class="logo-central" onclick="window.location.reload()">VIBES</div>
    
    <div class="icons">
        <i class="fa-solid fa-bag-shopping" onclick="toggleCart()">
            <span class="cart-count" id="cartCount">0</span>
        </i>
    </div>
</header>

<section class="hero-slider">
    <div class="slide">
        <div class="slide-content" style="margin-right: 50px;">
            <h2 style="font-size: 40px; text-transform: uppercase;">Destaque da Semana</h2>
            <p>Confira a nova linha esportiva de alta performance.</p>
        </div>
        <div class="slide-img">
            <img src="banner destaque/banner1.jpg" onerror="this.src='https://via.placeholder.com/600x400?text=Banner+Destaque'">
        </div>
    </div>
</section>

<div class="main-layout">
    <aside class="sidebar">
        <h4 style="margin-bottom: 20px; font-size: 12px; letter-spacing: 2px;">CATEGORIAS</h4>
        <ul class="sidebar-menu">
            <li class="active" onclick="filtrar('todos', this)">VER TODOS</li>
            <li onclick="filtrar('esportivo', this)">ESPORTIVOS</li>
            <li onclick="filtrar('feminino', this)">FEMININOS</li>
            <li onclick="filtrar('masculino', this)">MASCULINOS</li>
        </ul>
    </aside>

    <main class="product-grid" id="grid">
        </main>
</div>

<div class="cart-sidebar" id="cart">
    <h3>MINHA SACOLA</h3><br>
    <div id="cartItems"></div>
    <hr><br>
    <p>Total: <strong id="cartTotal">R$ 0,00</strong></p><br>
    <button class="btn-add" onclick="finalizar()">FINALIZAR NO WHATSAPP</button>
    <button onclick="toggleCart()" style="margin-top: 10px; border: none; background: none; cursor: pointer;">FECHAR</button>
</div>

<a href="https://wa.me/5519989620949" class="whatsapp-float" target="_blank">
    <i class="fa-brands fa-whatsapp"></i>
</a>

<script>
    // Configuração das 8 cores padrão
    const nomesCores = ["Preto", "Branco", "Azul", "Vermelho", "Verde", "Amarelo", "Laranja", "Cinza"];

    const produtos = [];

    // Gerar 12 Esportivos
    for(let i=1; i<=12; i++) {
        produtos.push({
            id: i,
            nome: `Vibes Sport ${i}`,
            preco: 259.90,
            pasta: "esportivos",
            cat: "esportivo",
            corAtual: 0
        });
    }

    // Adicionar Femininos e Masculinos (Exemplos)
    produtos.push({ id: 101, nome: "Vibes Lady Sun", preco: 189.0, pasta: "femininos", cat: "feminino", corAtual: 0 });
    produtos.push({ id: 201, nome: "Vibes Urban", preco: 210.0, pasta: "masculinos", cat: "masculino", corAtual: 0 });

    let carrinho = [];

    function render(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = lista.map(p => {
            // Lógica do caminho da imagem: pasta/IDproduto_Cor.jpg
            // Ex: esportivos/1_0.jpg, esportivos/1_1.jpg...
            const imgPath = `${p.pasta}/${p.id}_${p.corAtual}.jpg`;
            
            return `
            <div class="product-card">
                <div class="img-box">
                    <button class="nav-btn btn-l" onclick="trocarCor(${p.id}, -1)">❮</button>
                    <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/300x300?text=Sem+Foto'">
                    <button class="nav-btn btn-r" onclick="trocarCor(${p.id}, 1)">❯</button>
                </div>
                <h4>${p.nome}</h4>
                <small style="color:#888">${nomesCores[p.corAtual]}</small>
                <span class="price">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                <button class="btn-add" onclick="add(${p.id})">ADICIONAR</button>
            </div>
            `;
        }).join('');
    }

    function trocarCor(id, dir) {
        const p = produtos.find(x => x.id === id);
        p.corAtual += dir;
        if(p.corAtual > 7) p.corAtual = 0;
        if(p.corAtual < 0) p.corAtual = 7;
        render(produtos); // Recarrega para aplicar imagem nova
    }

    function filtrar(cat, el) {
        document.querySelectorAll('.sidebar-menu li').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        const f = cat === 'todos' ? produtos : produtos.filter(p => p.cat === cat);
        render(f);
    }

    function toggleCart() { document.getElementById('cart').classList.toggle('active'); }

    function add(id) {
        const p = produtos.find(x => x.id === id);
        carrinho.push({ ...p, corNome: nomesCores[p.corAtual] });
        atualizarCarrinho();
        toggleCart();
    }

    function atualizarCarrinho() {
        document.getElementById('cartCount').innerText = carrinho.length;
        let t = 0;
        document.getElementById('cartItems').innerHTML = carrinho.map((p, i) => {
            t += p.preco;
            return `<div style="margin-bottom:15px; font-size:12px;">
                ${p.nome} (${p.corNome}) - <strong>R$ ${p.preco.toFixed(2)}</strong>
                <span onclick="remover(${i})" style="color:red; cursor:pointer; margin-left:10px;">[x]</span>
            </div>`;
        }).join('');
        document.getElementById('cartTotal').innerText = `R$ ${t.toFixed(2).replace('.',',')}`;
    }

    function remover(i) {
        carrinho.splice(i, 1);
        atualizarCarrinho();
    }

    function finalizar() {
        let msg = "Olá, gostaria de pedir:%0A" + carrinho.map(p => `- ${p.nome} (${p.corNome})`).join('%0A');
        window.open(`https://wa.me/5519989620949?text=${msg}`, "_blank");
    }

    render(produtos);
</script>
</body>
</html>
