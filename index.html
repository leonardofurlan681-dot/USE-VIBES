<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballena Outlet | Camisas de Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* CORES EXTRAÍDAS DA LOGO */
        :root { 
            --accent: #79bcc7; /* Azul Turquesa da logo */
            --accent-hover: #5fa4af; /* Tom mais escuro para hover */
            --bg: #ffffff; 
            --text: #2b2e2a; /* Cinza Escuro da escrita Ballena */
            --card-bg: #ffffff; 
            --border: #eeeeee; 
            --header-bg: rgba(255, 255, 255, 0.98); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER CENTRALIZADO */
        header { 
            background: var(--header-bg); 
            padding: 15px 5%; 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }
        
        .header-left { display: flex; align-items: center; justify-content: flex-start; }
        .header-center { display: flex; align-items: center; justify-content: center; }
        .header-right { display: flex; align-items: center; justify-content: flex-end; gap: 20px; }

        .logo-nav { height: 65px; object-fit: contain; } /* Aumentado levemente para destacar a logo */

        header i { color: var(--text); font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        header i:hover { color: var(--accent); }

        /* HERO SECTION */
        .hero-image { 
            width: 100%; 
            height: 55vh; 
            position: relative; 
            overflow: hidden; 
            background: #fff; 
        }
        .hero-image img.bg-hero { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .hero-gradient { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to bottom, transparent 70%, var(--bg) 100%); 
            z-index: 1;
        }

        /* GRID DE PRODUTOS */
        .container { padding: 40px 5%; max-width: 1300px; margin: 0 auto; position: relative; z-index: 2; }
        .cat-title { 
            font-size: 1.3rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            text-align: center;
            letter-spacing: 2px;
            color: var(--text); /* Mantendo cinza escuro no título */
            border-bottom: 3px solid var(--accent); /* Detalhe em azul */
            display: table;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 5px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }
        
        .product-card { 
            background: var(--card-bg); 
            border-radius: 8px; 
            padding: 10px; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .product-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; margin-bottom: 12px; border-radius: 4px; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .product-card:hover img { transform: scale(1.05); }

        .product-info { text-align: center; margin-top: auto; }
        .product-card h3 { font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--text); text-transform: uppercase; min-height: 2.4em; display: flex; align-items: center; justify-content: center; }
        .product-card .price { font-weight: 800; color: var(--accent); font-size: 1rem; }

        /* MODAIS E CARRINHO */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            z-index: 3000; display: none; align-items: center; justify-content: center; 
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content { width: 90%; max-width: 400px; background: #fff; text-align: center; padding: 25px; border-radius: 12px; }
        
        .size-btn {
            padding: 10px 15px; border: 1px solid var(--border); background: none;
            margin: 5px; cursor: pointer; font-weight: 600; min-width: 55px; border-radius: 6px;
        }
        .size-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

        .btn-action { 
            width: 100%; padding: 18px; margin-top: 15px; border: none; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; border-radius: 8px;
            transition: 0.3s;
        }
        .btn-primary { background: var(--text); color: #fff; } /* Botão em cinza escuro para contraste */
        .btn-primary:hover { background: var(--accent); }

        .cart-sidebar { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 350px; 
            height: 100%; background: #fff; z-index: 2000; transition: 0.4s; 
            padding: 30px; border-left: 1px solid var(--border); display: flex; flex-direction: column; 
        }
        .cart-sidebar.open { right: 0; }
        
        .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #f9f9f9; padding-bottom: 15px; }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }

        #search-box { display: none; padding: 20px 5%; border-bottom: 1px solid var(--border); }
        #search-box input { width: 100%; max-width: 500px; margin: 0 auto; display: block; padding: 15px; border: 1px solid var(--border); text-align: center; border-radius: 50px; outline: none; }
        #search-box input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <i class="fas fa-search" onclick="toggleSearch()"></i>
    </div>

    <div class="header-center">
        <img src="logo.jpg" class="logo-nav" alt="Ballena Outlet">
    </div>

    <div class="header-right">
        <div onclick="toggleCart()" style="position:relative; cursor:pointer">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count" style="position:absolute; top:-8px; right:-10px; background:var(--accent); color:#fff; font-size:0.6rem; padding:2px 6px; border-radius:50%; font-weight:800">0</span>
        </div>
    </div>
</header>

<div id="search-box">
    <input type="text" id="input-busca" placeholder="O QUE VOCÊ PROCURA?" oninput="buscarProduto()">
</div>

<section class="hero-image">
    <div class="hero-gradient"></div>
    <img src="fundo.jpg" class="bg-hero">
</section>

<div class="container">
    <h2 class="cat-title">Camisas de Time</h2>
    <div id="main-content" class="grid"></div>
</div>

<div class="cart-sidebar" id="cart-sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 style="font-weight:800">Carrinho</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; color:#888"></i>
    </div>
    <div id="cart-list" style="flex:1; overflow-y:auto;"></div>
    <div id="cart-total" style="padding:20px 0; font-weight:800; border-top:1px solid #eee; display:flex; justify-content:space-between">
        <span>Total:</span>
        <span id="total-value">R$ 0,00</span>
    </div>
    <button class="btn-action btn-primary" onclick="finalizarWhatsApp()">Finalizar no WhatsApp</button>
</div>

<div class="modal-overlay" id="modal-produto">
    <div class="modal-content">
        <div class="img-container">
            <img id="m-img" src="" style="width:100%; height:100%; object-fit:cover">
        </div>
        <h2 id="m-nome" style="font-size:1rem; margin-bottom:10px"></h2>
        <p id="m-preco" style="font-weight:800; font-size:1.3rem; color:var(--accent); margin-bottom:15px"></p>
        <div id="m-sizes"></div>
        <button class="btn-action btn-primary" onclick="addAoCarrinho()">Adicionar ao Carrinho</button>
        <p onclick="closeModals()" style="text-align:center; cursor:pointer; margin-top:15px; font-size:0.8rem; color:#888">VOLTAR</p>
    </div>
</div>

<script>
const PRODUTOS_ESTATICOS = [
    { id: 1, nome: "Brasil Home 24/25", preco: "299,90", imagem: "https://images.tcdn.com.br/img/img_prod/1127110/camisa_selecao_brasileira_home_2024_sn_torcedor_masculina_amarela_3163_1_e417a869a239b9776f823293e5acda37.jpg" },
    { id: 2, nome: "Real Madrid Home 24/25", preco: "349,90", imagem: "https://imgcentauro-a.akamaihd.net/1300x1300/98713202.jpg" },
    { id: 3, nome: "Manchester City Home 24/25", preco: "349,90", imagem: "https://imgcentauro-a.akamaihd.net/1300x1300/98555102.jpg" },
    { id: 4, nome: "Flamengo I 2024", preco: "299,90", imagem: "https://images.tcdn.com.br/img/img_prod/1127110/camisa_flamengo_i_2024_sn_torcedor_masculina_vermelha_e_preta_2831_1_45d1d49f05244e85973e2ff1758e5f88.jpg" },
    { id: 5, nome: "Palmeiras I 2024", preco: "299,90", imagem: "https://images.tcdn.com.br/img/img_prod/1127110/camisa_palmeiras_i_2024_sn_torcedor_masculina_verde_2813_1_4dbf6f69185a732a392e21f669074094.jpg" },
    { id: 6, nome: "Inter de Milão Home 24/25", preco: "349,90", imagem: "https://imgcentauro-a.akamaihd.net/1300x1300/M0UP9702.jpg" },
    { id: 7, nome: "Barcelona Away 24/25", preco: "349,90", imagem: "https://imgcentauro-a.akamaihd.net/1300x1300/M0UL1802.jpg" },
    { id: 8, nome: "Argentina Home 2024", preco: "299,90", imagem: "https://images.tcdn.com.br/img/img_prod/1127110/camisa_selecao_argentina_home_2024_sn_torcedor_masculina_branca_e_celeste_3172_1_e46d03d387f31b8a531f868ac9d4a46d.jpg" }
];

let CART = [];
let SELECTED_PROD = null;
let SELECTED_SIZE = null;

function renderLoja(data = PRODUTOS_ESTATICOS) {
    const main = document.getElementById('main-content');
    main.innerHTML = data.map(p => `
        <div class="product-card" onclick="openProduct(${p.id})">
            <div class="img-container"><img src="${p.imagem}" onerror="this.src='https://via.placeholder.com/400x400?text=Camisa'"></div>
            <div class="product-info">
                <h3>${p.nome}</h3>
                <span class="price">R$ ${p.preco}</span>
            </div>
        </div>
    `).join('');
}

function openProduct(id) {
    SELECTED_PROD = PRODUTOS_ESTATICOS.find(p => p.id === id);
    document.getElementById('m-img').src = SELECTED_PROD.imagem;
    document.getElementById('m-nome').innerText = SELECTED_PROD.nome;
    document.getElementById('m-preco').innerText = `R$ ${SELECTED_PROD.preco}`;
    let sizes = ['P', 'M', 'G', 'GG'];
    SELECTED_SIZE = null;
    document.getElementById('m-sizes').innerHTML = sizes.map(s => `<button class="size-btn" onclick="selectSize(this, '${s}')">${s}</button>`).join('');
    document.getElementById('modal-produto').classList.add('active');
}

function selectSize(btn, s) {
    SELECTED_SIZE = s;
    Array.from(btn.parentNode.children).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function addAoCarrinho() {
    if(!SELECTED_SIZE) return alert("Selecione um tamanho!");
    CART.push({...SELECTED_PROD, tamanho: SELECTED_SIZE, cartId: Date.now()});
    updateCart(); closeModals(); toggleCart();
}

function updateCart() {
    document.getElementById('cart-count').innerText = CART.length;
    const list = document.getElementById('cart-list');
    let total = 0;
    list.innerHTML = CART.map(i => {
        total += parseFloat(i.preco.replace(',','.'));
        return `
            <div class="cart-item">
                <img src="${i.imagem}">
                <div style="flex:1">
                    <div style="font-size:0.8rem; font-weight:600">${i.nome}</div>
                    <div style="font-size:0.7rem; color:#888">Tamanho: ${i.tamanho}</div>
                    <div style="font-weight:800; font-size:0.9rem">R$ ${i.preco}</div>
                </div>
                <i class="fas fa-trash" style="color:#ff4444; cursor:pointer" onclick="removerDoCarrinho(${i.cartId})"></i>
            </div>`;
    }).join('');
    document.getElementById('total-value').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
}

function removerDoCarrinho(cid) { CART = CART.filter(i => i.cartId !== cid); updateCart(); }

function finalizarWhatsApp() {
    if(CART.length === 0) return alert("Carrinho vazio!");
    let msg = `*BALLENA OUTLET - NOVO PEDIDO*%0A%0A`;
    CART.forEach(i => msg += `- ${i.nome} (${i.tamanho}) - R$ ${i.preco}%0A`);
    msg += `%0A*Total: ${document.getElementById('total-value').innerText}*`;
    window.open(`https://wa.me/5519989620949?text=${msg}`);
}

function toggleSearch() {
    const box = document.getElementById('search-box');
    box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

function buscarProduto() {
    const termo = document.getElementById('input-busca').value.toLowerCase();
    const filtrados = PRODUTOS_ESTATICOS.filter(p => p.nome.toLowerCase().includes(termo));
    renderLoja(filtrados);
}

function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }
function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

renderLoja();
</script>

</body>
</html>
